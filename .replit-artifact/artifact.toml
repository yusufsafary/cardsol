kind = "web"
previewPath = "/"
title = "Cardsol - Prediction Cards Platform"
version = "1.0.0"
id = "artifacts/cardsol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20023

[services.development]
run = "pnpm --filter @workspace/cardsol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cardsol", "run", "build" ]
publicDir = "artifacts/cardsol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20023"
BASE_PATH = "/"
